<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca</title>

<style>
body{
    font-family: Arial;
    background:#f3e5f5;
    text-align:center;
}
h1{
    color:#6a1b9a;
}
input{
    padding:8px;
    margin:5px;
}
button{
    padding:8px;
    margin:5px;
    background:#6a1b9a;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#8e24aa;
}
.card{
    background:white;
    width:300px;
    margin:10px auto;
    border:2px solid purple;
    padding:10px;
    border-radius:10px;
}
.remover{
    background:red;
    border-radius:5px;
}
</style>
</head>
<body>

<h1>📚 Biblioteca</h1>
<input type="text" id="titulo" placeholder="Título">
<input type="text" id="serie" placeholder="Série">
<input type="number" id="ano" placeholder="Ano">
<button onclick="adicionarLivro()">Adicionar</button>
<br><br>
<input type="text" id="pesquisa" placeholder="Pesquisar">
<button onclick="pesquisarLivro()">Pesquisar</button>
<button onclick="listarLivros()">Mostrar Todos</button>
<button onclick="ordenarLivros()">Ordenar A-Z</button>
<h2 id="total"></h2>
<div id="biblioteca"></div>

<script>
let livros = [
{
    titulo:"Nascida à Meia-Noite",
    serie:"Shadow Falls",
    ano:2011
},
{
    titulo:"Desperta ao Amanhecer",
    serie:"Shadow Falls",
    ano:2012
},
{
    titulo:"Levada ao Entardecer",
    serie:"Shadow Falls",
    ano:2012
},
{
    titulo:"Sussurros ao Luar",
    serie:"Shadow Falls",
    ano:2013
}
];

listarLivros();

function listarLivros(){
    let div=document.getElementById("biblioteca");

    div.innerHTML="";

    document.getElementById("total").innerHTML =
    "Quantidade de livros: " + livros.length;

    for(let i=0;i<livros.length;i++){
        div.innerHTML +=
        "<div class='card'>"+
        "<h2>"+livros[i].titulo+"</h2>"+
        "<p><b>Série:</b> "+livros[i].serie+"</p>"+
        "<p><b>Ano:</b> "+livros[i].ano+"</p>"+
        "<button class='remover' onclick='removerLivro("+i+")'>Remover</button>"+
        "</div>";
    }
}

function adicionarLivro(){
    let titulo=document.getElementById("titulo").value.trim();
    let serie=document.getElementById("serie").value.trim();
    let ano=document.getElementById("ano").value;


    if(titulo=="" || serie=="" || ano==""){
        alert("Preencha todos os campos.");
        return;
    }

    livros.push({
        titulo:titulo,
        serie:serie,
        ano:Number(ano)
    });

    listarLivros();

    document.getElementById("titulo").value="";
    document.getElementById("serie").value="";
    document.getElementById("ano").value="";

}

function removerLivro(posicao){
    livros.splice(posicao,1);
    listarLivros();
}

function pesquisarLivro(){

    let pesquisa=document.getElementById("pesquisa").value.trim().toLowerCase();

    let div=document.getElementById("biblioteca");

    div.innerHTML="";

    let encontrados=0;

    for(let i=0;i<livros.length;i++){
        if(livros[i].titulo.toLowerCase().includes(pesquisa)){
            encontrados++;

            div.innerHTML +=
            "<div class='card'>"+
            "<h2>"+livros[i].titulo+"</h2>"+
            "<p><b>Série:</b> "+livros[i].serie+"</p>"+
            "<p><b>Ano:</b> "+livros[i].ano+"</p>"+
            "<button class='remover' onclick='removerLivro("+i+")'>Remover</button>"+
            "</div>";

        }
    }

    if(encontrados==0){
        div.innerHTML="<h2>Nenhum livro encontrado.</h2>";
    }

    document.getElementById("total").innerHTML =
    "Livros encontrados: " + encontrados;
}



function ordenarLivros(){
    livros.sort(function(a,b){
        return a.titulo.localeCompare(b.titulo);
    });
    listarLivros();
}
</script>
</body>
</html>
